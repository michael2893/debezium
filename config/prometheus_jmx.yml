#hostPort: 127.0.0.1:8081
lowercaseOutputName: true
whitelistObjectNames:
  - java.lang:type=GarbageCollector,*
  - java.lang:type=Memory,*
  - java.lang:type=Threading,*
  - debezium.mysql:*
  - kafka.connect:*

blacklistObjectNames:
  - cats.effect.unsafe.metrics:*
  - kafka.consumer.consumer.metrics:*
  - java.lang:type=MemoryPool,*
  - java.lang:type=MemoryManager,*
  - java.lang:type=ClassLoading,*
  - java.nio:*
  - java.util.logging:*
  - jdk.management.jfr:*
  - kafka.admin.client:*
  - kafka.consumer:*
  - kafka.producer:*

rules:
  - pattern: 'java.lang<type=Threading><>([A-Za-z0-9-_]*): (.*)'
    name: debezium_threading_$1
    value: $2
  - pattern: 'java.lang<type=Memory><(.*)>([A-Za-z0-9-_]*): (.*)'
    name: debezium_memory_$1_$2
    value: $3
  - pattern: 'java.lang<name=(.*), type=GarbageCollector(.*)><(.*)>([A-Za-z0-9-_]*): (.*)'
    name: debezium_gc_$1_$3_$4
    value: $5
  - pattern: 'kafka.connect<type=source-task-metrics, connector=(.+), task=(.+)><>([a-z-]+): (.*)'
    name: debezium_kafka_connect_connector_source_task_metrics_$3
    value: "$4"
    labels:
      connector: "$1"
      task: "$2"
  - pattern: 'kafka.connect<type=connector-task-metrics, connector=(.+), task=(.+)><>status: ([a-z-]+)'
    name: debezium_kafka_connect_connector_status
    value: 1
    labels:
      connector: "$1"
      task: "$2"
      status: "$3"
  - pattern: 'kafka.connect<type=connect-worker-metrics, connector=(.+)><>([a-z-]+): (.*)'
    name: debezium_kafka_connect_worker_$2
    labels:
      connector: "$1"
    value: "$3"
  - pattern: 'kafka.connect<type=connect-worker-metrics><>([a-z-]+): (.*)'
    name: debezium_kafka_connect_worker_$1
    value: "$2"
  - pattern: 'kafka.connect<type=connect-coordinator-metrics, client-id=([^:]+)><>([^:]+)'
    name: "debezium_kafka_connect_coordinator_metrics_$2"
    labels:
      client: "$1"
  - pattern: 'kafka.connect<type=connect-metrics, client-id=([^:]+)><>([^:]+)'
    name: "debezium_kafka_connect_metrics_$2"
    labels:
      client: "$1"
  - pattern: 'kafka.connect<type=connect-worker-rebalance-metrics><>([a-z-]+): (.*)'
    name: debezium_kafka_connect_worker_rebalance_$1
    value: "$2"
  - pattern: "debezium.([^:]+)<type=connector-metrics, context=([^,]+), server=([^,]+), key=([^>]+)><>RowsScanned"
    name: "debezium_metrics_RowsScanned"
    labels:
      plugin: "$1"
      name: "$3"
      context: "$2"
      table: "$4"
  - pattern: "debezium.([^:]+)<type=connector-metrics, context=([^,]+), server=([^>]+)>([^:]+)"
    name: "debezium_metrics_$4"
    labels:
      plugin: "$1"
      name: "$3"
      context: "$2"
#  - pattern: '(.*)'
#    name: $0