---
name: debezium
up:
  - custom:
      name: install openjdk java11
      met?: brew list --cask | grep '^adoptopenjdk11$' >/dev/null 2>&1
      meet: brew install --cask adoptopenjdk/openjdk/adoptopenjdk11
  - homebrew:
    - maven
  - java: "11"

build: "mvn clean install -Passembly -DskipITs -DskipTests"
test: "mvn clean install -Passembly"
