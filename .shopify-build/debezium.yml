---
containers:
  latest:
    environment: production
  1.3.1:
    environment: 1.3.1
    build:
      command: pipa build -- ./script/build v1.3.1.Final
      env:
        PIPA_GIT_CLONE_FLAGS: " "
  1.2.3:
    environment: 1.2.3
    build:
      command: pipa build -- ./script/build v1.2.3.Final
      env:
        PIPA_GIT_CLONE_FLAGS: " "


steps:
  - build: 1.3.1
  - build: 1.2.3
  - build: latest
  - wait
  - label: Test Connector
    run: cd src && ../script/test_connector_mysql
    container: latest
    timeout: 20m
