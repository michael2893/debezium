---
containers:
  v2.3.0.Final:
    application: dbz-v2.3.0.final
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "v2.3.0.Final"
        IS_LATEST: "false"
        BUILD_CONNECTOR_MYSQL: "/app/script/build_connector_mysql"
  latest:
    application: debezium
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "2.4.0-SNAPSHOT"
        IS_LATEST: "true"
        BUILD_CONNECTOR_MYSQL: "/app/script/build_connector_mysql"
  latest-test:
    application: debezium-test
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "2.4.0-SNAPSHOT"
        IS_LATEST: "true"
        BUILD_CONNECTOR_MYSQL: "/app/script/test_connector_mysql"



steps:
  - build: latest
  - build: latest-test
  - build: v2.3.0.Final
