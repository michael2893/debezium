---
containers:
  latest:
    environment: production
  1.4.0:
    environment: 1.4.0
    build:
      command: pipa build -- ./script/build v1.4.0.Final
      env:
        PIPA_GIT_CLONE_FLAGS: " "
  1.5.0:
    environment: 1.5.0 
    build:
      command: pipa build -- ./script/build v1.5.0.Final
      env:
        PIPA_GIT_CLONE_FLAGS: " "

steps:
  - build: 1.5.0
  - build: 1.4.0
  - build: latest
  - wait
  - label: Test Connector
    run: cd src && ../script/test_connector_mysql
    container: latest
    timeout: 20m
