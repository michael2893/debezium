---
containers:
  v1.9.0.Alpha2:
    application: dbz-v1.9.0.alpha2
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "v1.9.0.Alpha2"
        IS_LATEST: "false"
        BUILD_CONNECTOR_MYSQL: "/app/script/build_connector_mysql"
  v1.9.3.Final:
    application: dbz-v1.9.3.final
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "v1.9.3.Final"
        IS_LATEST: "false"
        BUILD_CONNECTOR_MYSQL: "/app/script/build_connector_mysql"
  latest:
    application: debezium
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "1.9.0-SNAPSHOT"
        IS_LATEST: "true"
        BUILD_CONNECTOR_MYSQL: "/app/script/test_connector_mysql"



steps:
  - build: latest
  - build: v1.9.0.Alpha2
  - build: v1.9.3.Final
