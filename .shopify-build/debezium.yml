---
containers:
  v2.0.0.CR1:
    application: dbz-v2.0.0.cr1
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "v2.0.0.CR1"
        IS_LATEST: "false"
        BUILD_CONNECTOR_MYSQL: "/app/script/build_connector_mysql"
  latest:
    application: debezium
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "2.0.0-SNAPSHOT"
        IS_LATEST: "true"
        BUILD_CONNECTOR_MYSQL: "/app/script/build_connector_mysql"
  latest-test:
    application: debezium-test
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "2.0.0-SNAPSHOT"
        IS_LATEST: "true"
        BUILD_CONNECTOR_MYSQL: "/app/script/test_connector_mysql"



steps:
  - build: latest
  - build: latest-test
  - build: v2.0.0.CR1
