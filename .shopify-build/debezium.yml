---
containers:
  v1.9.3.Final:
    application: dbz-v1.9.3.final
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "v1.9.3.Final"
        IS_LATEST: "false"
        BUILD_CONNECTOR_MYSQL: "/app/script/build_connector_mysql"
  latest:
    application: debezium
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "2.0.0-SNAPSHOT"
        IS_LATEST: "true"
        BUILD_CONNECTOR_MYSQL: "/app/script/build_connector_mysql"
  latest-test:
    application: debezium-test
    dockerfile:
      build_args:
        DEBEZIUM_VERSION: "2.0.0-SNAPSHOT"
        IS_LATEST: "true"
        BUILD_CONNECTOR_MYSQL: "/app/script/test_connector_mysql"



steps:
  - build: latest
  - build: latest-test
  - build: v1.9.3.Final
